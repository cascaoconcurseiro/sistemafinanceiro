name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18.18.0'
  NPM_VERSION: '10.2.4'

jobs:
  # ================================
  # QUALITY CHECKS
  # ================================
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧹 ESLint Check
        run: npm run lint:check

      - name: 💅 Prettier Check
        run: npm run format:check

      - name: 🔍 TypeScript Check
        run: npm run type-check

      - name: 📊 Upload ESLint Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

  # ================================
  # SECURITY SCAN
  # ================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🛡️ NPM Audit
        run: npm audit --audit-level=moderate

      - name: 🔍 Dependency Check
        run: npm run deps:check

  # ================================
  # TESTS
  # ================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test-group: [unit, integration, e2e]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run Unit Tests
        if: matrix.test-group == 'unit'
        run: npm run test:unit -- --coverage --watchAll=false

      - name: 🧪 Run Integration Tests
        if: matrix.test-group == 'integration'
        run: npm run test:integration -- --watchAll=false

      - name: 🎭 Install Playwright
        if: matrix.test-group == 'e2e'
        run: npx playwright install --with-deps

      - name: 🧪 Run E2E Tests
        if: matrix.test-group == 'e2e'
        run: npm run test:e2e

      - name: 📊 Upload Test Coverage
        if: matrix.test-group == 'unit'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # ================================
  # BUILD & DEPLOY
  # ================================
  build:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: [quality, security, test]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🏗️ Build Application
        run: npm run build:production
        env:
          SKIP_ENV_VALIDATION: true

      - name: 📊 Build Analysis
        run: npm run analyze:build

      - name: 🚀 Deploy to Netlify (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: netlify/actions/deploy@master
        with:
          publish-dir: ./.next
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: 🚀 Deploy to Netlify (Preview)
        if: github.event_name == 'pull_request'
        uses: netlify/actions/deploy@master
        with:
          publish-dir: ./.next
          production-deploy: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ================================
  # LIGHTHOUSE AUDIT
  # ================================
  lighthouse:
    name: 🏆 Performance Audit
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏆 Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: '.lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ================================
  # NOTIFICATIONS
  # ================================
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [quality, security, test, build]
    if: always()

    steps:
      - name: 📢 Success Notification
        if: needs.build.result == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: '🎉 Deployment successful! All checks passed.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 📢 Failure Notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: '❌ Pipeline failed. Check the logs for details.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
