<!DOCTYPE html>
<html>
<head>
    <title>Forçar Logout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            margin-top: 1rem;
        }
        .success {
            color: #10b981;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Forçando Logout</h1>
        <div class="spinner"></div>
        <p class="status" id="status">Limpando sessão...</p>
    </div>
    
    <script>
        async function forceLogout() {
            const statusEl = document.getElementById('status');
            
            try {
                // 1. Chamar API de logout
                statusEl.textContent = 'Chamando API de logout...';
                await fetch('/api/auth/force-logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                
                // 2. Limpar cookies manualmente
                statusEl.textContent = 'Limpando cookies...';
                document.cookie.split(";").forEach(function(c) { 
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
                });
                
                // 3. Limpar storage
                statusEl.textContent = 'Limpando storage...';
                localStorage.clear();
                sessionStorage.clear();
                
                // 4. Sucesso
                statusEl.className = 'status success';
                statusEl.textContent = '✓ Logout completo! Redirecionando...';
                
                // 5. Redirecionar
                setTimeout(() => {
                    window.location.href = '/auth/login';
                }, 1000);
                
            } catch (error) {
                console.error('Erro:', error);
                setTimeout(() => {
                    window.location.href = '/auth/login';
                }, 2000);
            }
        }
        
        forceLogout();
    </script>
</body>
</html>
